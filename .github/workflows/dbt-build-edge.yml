name: "dbt-postgres: Build and Publish Edge"

on:
  schedule:
    - cron: '0 0 * * *'  # Nightly at midnight UTC
  push:
    branches:
      - main
    paths:
      - 'dbt-postgres/**'
      - '.github/workflows/dbt-build-edge.yml'
  workflow_dispatch:

concurrency:
  group: dbt-edge-build
  cancel-in-progress: true

jobs:
  edge:
    uses: ./.github/workflows/_build-edge.yml
    with:
      image_name: dataviking-tech/dbt-postgres
      context_dir: dbt-postgres
      test_script: /usr/local/bin/validate-tools.sh
      cache_scope: dbt-postgres
      build_strategy: qemu
      summary_title: "dbt-postgres Edge Image Published"
    secrets: inherit
    permissions:
      contents: read
      packages: write
