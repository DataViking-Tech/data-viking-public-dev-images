name: "Reusable: Build and Publish Edge"

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Full image name (e.g. dataviking-tech/ai-dev-base)'
        required: true
        type: string
      context_dir:
        description: 'Docker build context directory (e.g. ai-dev-base)'
        required: true
        type: string
      test_script:
        description: 'Path to test script inside the container (e.g. /usr/local/bin/test-tools.sh)'
        required: true
        type: string
      cache_scope:
        description: 'GHA cache scope prefix (e.g. ai-dev-base)'
        required: true
        type: string
      build_strategy:
        description: '"native" for parallel native runners, "qemu" for QEMU emulation'
        required: false
        type: string
        default: 'qemu'
      validate_metadata_script:
        description: 'Optional path to metadata validation script (relative to repo root)'
        required: false
        type: string
        default: ''
      summary_title:
        description: 'Title for the GitHub step summary (e.g. "ai-dev-base Edge Image Published")'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # ── Native strategy: parallel builds on native runners ──────────────
  build-native:
    if: inputs.build_strategy == 'native'
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (single platform)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context_dir }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ inputs.image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.cache_scope }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache_scope }}-${{ matrix.arch }}
          provenance: false
          sbom: false

      - name: Test image
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ inputs.image_name }}@${{ steps.build.outputs.digest }} \
            ${{ inputs.test_script }}

      - name: Save digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.arch }}

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.arch }}
          retention-days: 1

  merge-native:
    if: inputs.build_strategy == 'native'
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          AMD64_DIGEST=$(cat /tmp/digests/amd64)
          ARM64_DIGEST=$(cat /tmp/digests/arm64)
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ inputs.image_name }}:edge \
            ${{ env.REGISTRY }}/${{ inputs.image_name }}@${AMD64_DIGEST} \
            ${{ env.REGISTRY }}/${{ inputs.image_name }}@${ARM64_DIGEST}

      - name: Validate devcontainer metadata
        if: inputs.validate_metadata_script != ''
        run: ${{ inputs.validate_metadata_script }} ${{ env.REGISTRY }}/${{ inputs.image_name }}:edge

      - name: Image summary
        run: |
          echo "### ${{ inputs.summary_title }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** edge" >> $GITHUB_STEP_SUMMARY
          echo "**Built from:** \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ inputs.image_name }}:edge\`" >> $GITHUB_STEP_SUMMARY

  # ── QEMU strategy: single job with emulation ────────────────────────
  build-qemu:
    if: inputs.build_strategy == 'qemu'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push edge image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context_dir }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ inputs.image_name }}:edge
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=edge
          cache-from: type=gha,scope=${{ inputs.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache_scope }}
          provenance: false
          sbom: false

      - name: Test edge image (amd64)
        run: |
          docker run --rm --platform linux/amd64 ${{ env.REGISTRY }}/${{ inputs.image_name }}:edge \
            ${{ inputs.test_script }}

      - name: Test edge image (arm64)
        run: |
          docker run --rm --platform linux/arm64 ${{ env.REGISTRY }}/${{ inputs.image_name }}:edge \
            ${{ inputs.test_script }}

      - name: Image summary
        run: |
          echo "### ${{ inputs.summary_title }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** edge" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "**Built from:** \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ inputs.image_name }}:edge\`" >> $GITHUB_STEP_SUMMARY
