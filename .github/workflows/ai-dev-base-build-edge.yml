name: "ai-dev-base: Build and Publish Edge"

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  push:
    branches:
      - main
    paths:
      - 'ai-dev-base/**'
      - '.github/workflows/ai-dev-base-build-edge.yml'
  workflow_dispatch:

concurrency:
  group: ai-dev-base-edge-build
  cancel-in-progress: true

jobs:
  edge:
    uses: ./.github/workflows/_build-edge.yml
    with:
      image_name: dataviking-tech/ai-dev-base
      context_dir: ai-dev-base
      test_script: /usr/local/bin/test-tools.sh
      cache_scope: ai-dev-base
      build_strategy: native
      validate_metadata_script: ./ai-dev-base/tests/validate-metadata.sh
      summary_title: "ai-dev-base Edge Image Published"
    secrets: inherit
    permissions:
      contents: read
      packages: write

  trigger-downstream:
    needs: edge
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Trigger downstream edge rebuilds
        uses: actions/github-script@v8
        with:
          script: |
            const workflows = [
              'godot-build-edge.yml',
              'dbt-build-edge.yml'
            ];
            for (const workflow of workflows) {
              console.log(`Dispatching ${workflow}...`);
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow,
                ref: 'main'
              });
              console.log(`Dispatched ${workflow}`);
            }
