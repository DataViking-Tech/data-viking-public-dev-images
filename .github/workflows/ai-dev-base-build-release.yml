name: "ai-dev-base: Build and Publish Release"

on:
  push:
    tags:
      - 'ai-dev-base/v[0-9]+.[0-9]+.[0-9]+'
  workflow_call:
    inputs:
      tag:
        description: 'The version tag to build (e.g. ai-dev-base/v1.2.3)'
        required: true
        type: string
  workflow_dispatch:

jobs:
  release:
    uses: ./.github/workflows/_build-release.yml
    with:
      tag: ${{ inputs.tag || '' }}
      image_name: dataviking-tech/ai-dev-base
      tag_prefix: ai-dev-base
      context_dir: ai-dev-base
      test_script: /usr/local/bin/test-tools.sh
      cache_scope: ai-dev-base
      build_strategy: native
      validate_metadata_script: ./ai-dev-base/tests/validate-metadata.sh
      summary_title: "ai-dev-base Release Image Published"
    secrets: inherit
    permissions:
      contents: read
      packages: write
