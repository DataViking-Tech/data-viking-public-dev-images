name: "Godot: Build and Publish Edge"

on:
  schedule:
    - cron: '0 0 * * *'  # Nightly at midnight UTC
  push:
    branches:
      - main
    paths:
      - 'godot-game-dev/**'
      - '.github/workflows/godot-build-edge.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dataviking-tech/godot-game-dev-image

# Prevent multiple edge builds from running simultaneously
concurrency:
  group: godot-edge-build
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag current edge as edge-previous
        continue-on-error: true
        run: |
          # Preserve the current :edge manifest as :edge-previous for rollback.
          # Fails gracefully on first-ever build when no :edge exists yet.
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge-previous \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge

      - name: Build and push edge image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: godot-game-dev
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=edge
          cache-from: type=gha,scope=godot-game-dev
          cache-to: type=gha,mode=max,scope=godot-game-dev
          provenance: false
          sbom: false

      - name: Test edge image (amd64)
        run: |
          docker run --rm --platform linux/amd64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge \
            /usr/local/bin/validate-tools.sh

      - name: Test edge image (arm64)
        run: |
          docker run --rm --platform linux/arm64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge \
            /usr/local/bin/validate-tools.sh

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Image summary
        run: |
          echo "### Godot Edge Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** edge" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "**Built from:** \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge\`" >> $GITHUB_STEP_SUMMARY
          echo "**Rollback:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge-previous\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge"
          MANIFEST_INDEX=$(docker buildx imagetools inspect --raw "$IMAGE_REF")
          echo "**Image Size (compressed):**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "$MANIFEST_INDEX" | jq -r '
            .manifests[] | select(.platform.os == "linux") |
            "\(.platform.architecture) \(.digest)"
          ' | while IFS=' ' read -r ARCH DIGEST; do
            PLAT_RAW=$(docker buildx imagetools inspect --raw "${IMAGE_REF}@${DIGEST}")
            LAYER_BYTES=$(echo "$PLAT_RAW" | jq '[.layers[].size] | add')
            CONFIG_BYTES=$(echo "$PLAT_RAW" | jq '.config.size')
            TOTAL_BYTES=$((LAYER_BYTES + CONFIG_BYTES))
            if [ "$TOTAL_BYTES" -ge 1073741824 ]; then
              SIZE=$(echo "scale=2; $TOTAL_BYTES / 1073741824" | bc)
              echo "| linux/${ARCH} | ${SIZE} GB |" >> $GITHUB_STEP_SUMMARY
            else
              SIZE=$(echo "scale=1; $TOTAL_BYTES / 1048576" | bc)
              echo "| linux/${ARCH} | ${SIZE} MB |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  notify-failure:
    needs: [build-and-push]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: ./.github/actions/slack-notify-build-failure
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          image-name: godot-game-dev (edge)
