name: "Godot: Build and Publish Edge"

on:
  schedule:
    - cron: '0 0 * * *'  # Nightly at midnight UTC
  push:
    branches:
      - main
    paths:
      - 'godot-game-dev/**'
      - '.github/workflows/godot-build-edge.yml'
  workflow_dispatch:

concurrency:
  group: godot-edge-build
  cancel-in-progress: true

jobs:
  edge:
    uses: ./.github/workflows/_build-edge.yml
    with:
      image_name: dataviking-tech/godot-game-dev-image
      context_dir: godot-game-dev
      test_script: /usr/local/bin/validate-tools.sh
      cache_scope: godot-game-dev
      build_strategy: qemu
      summary_title: "Godot Edge Image Published"
    secrets: inherit
    permissions:
      contents: read
      packages: write
