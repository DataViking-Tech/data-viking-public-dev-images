name: "ai-dev-base: PR Build Validation"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'ai-dev-base/**'
      - '.github/workflows/ai-dev-base-build-pr.yml'

concurrency:
  group: ai-dev-base-pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ai-dev-base-pr

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build amd64 image (no push)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ai-dev-base
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.pull_request.number }}
            ghcr.io/dataviking-tech/ai-dev-base:edge
          cache-from: type=gha,scope=ai-dev-base-linux/amd64
          cache-to: type=gha,mode=max,scope=ai-dev-base-linux/amd64
          provenance: false
          sbom: false

      - name: Run test-tools.sh
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:${{ github.event.pull_request.number }} \
            /usr/local/bin/test-tools.sh

      - name: Validate devcontainer metadata
        run: ./ai-dev-base/tests/validate-metadata.sh ${{ env.IMAGE_NAME }}:${{ github.event.pull_request.number }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.event.pull_request.number }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
      - name: Image size summary
        run: |
          echo "### ai-dev-base PR Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SIZE=$(docker images ${{ env.IMAGE_NAME }}:${{ github.event.pull_request.number }} --format '{{.Size}}')
          echo "**Image Size (uncompressed):** ${SIZE}" >> $GITHUB_STEP_SUMMARY

      - name: Export ai-dev-base image for downstream jobs
        run: docker save ghcr.io/dataviking-tech/ai-dev-base:edge -o /tmp/ai-dev-base.tar

      - name: Upload ai-dev-base image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ai-dev-base-image
          path: /tmp/ai-dev-base.tar
          retention-days: 1

  build-dbt-postgres:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download ai-dev-base image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ai-dev-base-image
          path: /tmp

      - name: Load ai-dev-base image
        run: docker load -i /tmp/ai-dev-base.tar

      - name: Build dbt-postgres image (no push)
        uses: devcontainers/ci@8bf61b26e9c3a98f69cb6ce2f88d24ff59b785c6 # v0.3
        with:
          configFile: dbt-postgres/.devcontainer/ci/devcontainer.json
          imageName: dbt-postgres-pr
          imageTag: ${{ github.event.pull_request.number }}
          push: never

      - name: Run validate-tools.sh
        run: |
          docker run --rm dbt-postgres-pr:${{ github.event.pull_request.number }} \
            /usr/local/bin/validate-tools.sh

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          image-ref: dbt-postgres-pr:${{ github.event.pull_request.number }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  build-godot-game-dev:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download ai-dev-base image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ai-dev-base-image
          path: /tmp

      - name: Load ai-dev-base image
        run: docker load -i /tmp/ai-dev-base.tar

      - name: Build godot-game-dev image (no push)
        uses: devcontainers/ci@8bf61b26e9c3a98f69cb6ce2f88d24ff59b785c6 # v0.3
        with:
          configFile: godot-game-dev/.devcontainer/ci/devcontainer.json
          imageName: godot-game-dev-pr
          imageTag: ${{ github.event.pull_request.number }}
          push: never

      - name: Run validate-tools.sh
        run: |
          docker run --rm godot-game-dev-pr:${{ github.event.pull_request.number }} \
            /usr/local/bin/validate-tools.sh

      - name: Validate devcontainer metadata
        run: ./godot-game-dev/tests/validate-metadata.sh godot-game-dev-pr:${{ github.event.pull_request.number }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          image-ref: godot-game-dev-pr:${{ github.event.pull_request.number }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
  notify-failure:
    needs: [build-and-test, build-dbt-postgres, build-godot-game-dev, validate-arm64]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: ./.github/actions/slack-notify-build-failure
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          image-name: ai-dev-base (PR)

  # Validate arm64 build on native runner (no QEMU)
  validate-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build arm64 image (validation only)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ai-dev-base
          push: false
          platforms: linux/arm64
          cache-from: type=gha,scope=ai-dev-base-linux/arm64
          cache-to: type=gha,mode=max,scope=ai-dev-base-linux/arm64
          provenance: false
          sbom: false
