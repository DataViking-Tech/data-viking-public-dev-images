name: "Godot: Auto Semver Tag"

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: godot-auto-tag
  cancel-in-progress: false

jobs:
  auto-tag:
    uses: ./.github/workflows/_auto-tag.yml
    with:
      image_dir: godot-game-dev
    permissions:
      contents: write
      pull-requests: read

  build-release:
    needs: auto-tag
    if: needs.auto-tag.outputs.skipped != 'true'
    uses: ./.github/workflows/godot-build-release.yml
    with:
      tag: ${{ needs.auto-tag.outputs.tag }}
    secrets: inherit
