name: "dbt-postgres: PR Build Validation"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'dbt-postgres/**'
      - '.github/workflows/dbt-build-pr.yml'

concurrency:
  group: dbt-pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  IMAGE_NAME: dbt-postgres-pr

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check if ai-dev-base also changed
        id: base-changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            base:
              - 'ai-dev-base/**'

      - name: Skip if ai-dev-base changed (handled by ai-dev-base PR workflow)
        if: steps.base-changes.outputs.base == 'true'
        run: |
          echo "::notice::Skipping standalone dbt-postgres build — ai-dev-base also changed, downstream build handled by ai-dev-base PR workflow."
          exit 0

      - name: Build dev container image (no push)
        if: steps.base-changes.outputs.base != 'true'
        uses: devcontainers/ci@8bf61b26e9c3a98f69cb6ce2f88d24ff59b785c6 # v0.3
        with:
          configFile: dbt-postgres/.devcontainer/ci/devcontainer.json
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ github.event.pull_request.number }}
          push: never

      - name: Run validate-tools.sh
        if: steps.base-changes.outputs.base != 'true'
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:${{ github.event.pull_request.number }} \
            /usr/local/bin/validate-tools.sh

      - name: Run Trivy vulnerability scanner
        if: steps.base-changes.outputs.base != 'true'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.event.pull_request.number }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  validate-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check if ai-dev-base also changed
        id: base-changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            base:
              - 'ai-dev-base/**'

      - name: Set up QEMU (arm64 emulation)
        if: steps.base-changes.outputs.base != 'true'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        if: steps.base-changes.outputs.base != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build arm64 image (validation only)
        if: steps.base-changes.outputs.base != 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: dbt-postgres
          push: false
          platforms: linux/arm64
          cache-from: type=gha,scope=dbt-postgres-arm64
          cache-to: type=gha,mode=max,scope=dbt-postgres-arm64
          provenance: false
          sbom: false

  notify-failure:
    needs: [build-and-test, validate-arm64]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/slack-notify-build-failure
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          image-name: dbt-postgres (PR)
