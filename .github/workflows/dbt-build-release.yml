name: "dbt-postgres: Build and Publish Release"

on:
  push:
    tags:
      - 'dbt-postgres/v[0-9]+.[0-9]+.[0-9]+'
  workflow_call:
    inputs:
      tag:
        description: 'The version tag to build (e.g. dbt-postgres/v1.0.0)'
        required: true
        type: string
  workflow_dispatch:

jobs:
  release:
    uses: ./.github/workflows/_build-release.yml
    with:
      tag: ${{ inputs.tag || '' }}
      image_name: dataviking-tech/dbt-postgres
      tag_prefix: dbt-postgres
      context_dir: dbt-postgres
      test_script: /usr/local/bin/validate-tools.sh
      cache_scope: dbt-postgres
      build_strategy: qemu
      summary_title: "dbt-postgres Release Image Published"
    secrets: inherit
    permissions:
      contents: read
      packages: write
