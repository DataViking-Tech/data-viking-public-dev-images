name: "Reusable: Build and Publish Release"

on:
  workflow_call:
    inputs:
      tag:
        description: 'The version tag to build (e.g. ai-dev-base/v1.2.3)'
        required: false
        type: string
        default: ''
      image_name:
        description: 'Full image name (e.g. dataviking-tech/ai-dev-base)'
        required: true
        type: string
      tag_prefix:
        description: 'Tag prefix to strip for version extraction (e.g. ai-dev-base)'
        required: true
        type: string
      context_dir:
        description: 'Docker build context directory (e.g. ai-dev-base)'
        required: true
        type: string
      test_script:
        description: 'Path to test script inside the container'
        required: true
        type: string
      cache_scope:
        description: 'GHA cache scope prefix (e.g. ai-dev-base)'
        required: true
        type: string
      build_strategy:
        description: '"native" for parallel native runners, "qemu" for QEMU emulation'
        required: false
        type: string
        default: 'qemu'
      validate_metadata_script:
        description: 'Optional path to metadata validation script (relative to repo root)'
        required: false
        type: string
        default: ''
      summary_title:
        description: 'Title for the GitHub step summary (e.g. "ai-dev-base Release Image Published")'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # ── Version extraction (shared by all strategies) ───────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      major: ${{ steps.version.outputs.MAJOR }}
      minor: ${{ steps.version.outputs.MINOR }}
    steps:
      - name: Extract and validate version from tag
        id: version
        env:
          TAG_PREFIX: ${{ inputs.tag_prefix }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "$INPUT_TAG" ]; then
            echo "VERSION=manual" >> $GITHUB_OUTPUT
            echo "MAJOR=" >> $GITHUB_OUTPUT
            echo "MINOR=" >> $GITHUB_OUTPUT
          else
            if [ -n "$INPUT_TAG" ]; then
              RAW_TAG="$INPUT_TAG"
            else
              RAW_TAG=${GITHUB_REF#refs/tags/}
            fi

            # Strip image prefix to get bare version
            TAG="${RAW_TAG#${TAG_PREFIX}/}"

            if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Error: Tag must match semantic version format (vX.Y.Z), got: $TAG"
              exit 1
            fi
            echo "VERSION=${TAG}" >> $GITHUB_OUTPUT

            # Extract major and minor versions for tags
            VERSION_NUMS=${TAG#v}
            MAJOR=$(echo $VERSION_NUMS | cut -d. -f1)
            MINOR=$(echo $VERSION_NUMS | cut -d. -f1-2)
            echo "MAJOR=v${MAJOR}" >> $GITHUB_OUTPUT
            echo "MINOR=v${MINOR}" >> $GITHUB_OUTPUT
          fi

  # ── Native strategy: parallel builds on native runners ──────────────
  build-native:
    if: inputs.build_strategy == 'native'
    needs: version
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (single platform)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context_dir }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ inputs.image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.cache_scope }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache_scope }}-${{ matrix.arch }}
          provenance: false
          sbom: false

      - name: Test image
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ inputs.image_name }}@${{ steps.build.outputs.digest }} \
            ${{ inputs.test_script }}

      - name: Save digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.arch }}

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.arch }}
          retention-days: 1

  merge-native:
    if: inputs.build_strategy == 'native'
    needs: [version, build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          AMD64_DIGEST=$(cat /tmp/digests/amd64)
          ARM64_DIGEST=$(cat /tmp/digests/arm64)
          TAGS=("--tag" "${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.version }}")
          if [ -n "${{ needs.version.outputs.minor }}" ]; then
            TAGS+=("--tag" "${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.minor }}")
            TAGS+=("--tag" "${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.major }}")
          fi
          docker buildx imagetools create \
            "${TAGS[@]}" \
            ${{ env.REGISTRY }}/${{ inputs.image_name }}@${AMD64_DIGEST} \
            ${{ env.REGISTRY }}/${{ inputs.image_name }}@${ARM64_DIGEST}

      - name: Validate devcontainer metadata
        if: needs.version.outputs.version != 'manual' && inputs.validate_metadata_script != ''
        run: ${{ inputs.validate_metadata_script }} ${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.version }}

      - name: Image summary
        if: needs.version.outputs.version != 'manual'
        run: |
          echo "### ${{ inputs.summary_title }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.version }}\` (immutable)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.minor }}\` (tracks patch)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.major }}\` (tracks minor)" >> $GITHUB_STEP_SUMMARY

  # ── QEMU strategy: single job with emulation ────────────────────────
  build-qemu:
    if: inputs.build_strategy == 'qemu'
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context_dir }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.minor }}
            ${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.major }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
          cache-from: type=gha,scope=${{ inputs.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache_scope }}
          provenance: false
          sbom: false

      - name: Test release image (amd64)
        if: needs.version.outputs.version != 'manual'
        run: |
          docker run --rm --platform linux/amd64 ${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.version }} \
            ${{ inputs.test_script }}

      - name: Test release image (arm64)
        if: needs.version.outputs.version != 'manual'
        run: |
          docker run --rm --platform linux/arm64 ${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.version }} \
            ${{ inputs.test_script }}

      - name: Image summary
        if: needs.version.outputs.version != 'manual'
        run: |
          echo "### ${{ inputs.summary_title }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.version }}\` (immutable)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.minor }}\` (tracks patch)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ needs.version.outputs.major }}\` (tracks minor)" >> $GITHUB_STEP_SUMMARY
