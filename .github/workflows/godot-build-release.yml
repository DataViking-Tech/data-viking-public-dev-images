name: "Godot: Build and Publish Release"

on:
  push:
    tags:
      - 'godot-game-dev/v[0-9]+.[0-9]+.[0-9]+'
  workflow_call:
    inputs:
      tag:
        description: 'The version tag to build (e.g. godot-game-dev/v1.2.3)'
        required: true
        type: string
  workflow_dispatch:

jobs:
  release:
    uses: ./.github/workflows/_build-release.yml
    with:
      tag: ${{ inputs.tag || '' }}
      image_name: dataviking-tech/godot-game-dev-image
      tag_prefix: godot-game-dev
      context_dir: godot-game-dev
      test_script: /usr/local/bin/validate-tools.sh
      cache_scope: godot-game-dev
      build_strategy: qemu
      summary_title: "Godot Release Image Published"
    secrets: inherit
    permissions:
      contents: read
      packages: write
