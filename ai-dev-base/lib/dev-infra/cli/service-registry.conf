# Service Registry — Central mapping for CLI wrappers
#
# Each wrapper checks env vars first, then falls back to these defaults.
# Override per-project via env vars in devcontainer.json or postCreateCommand.
#
# Doppler project/config mappings:
# SUPA_PROJECT=my-project
# SUPA_CONFIG=prd
# DAGSTER_PROJECT=my-project
# DAGSTER_CONFIG=prd
# DBX_PROJECT=my-project
# DBX_CONFIG=prd
# CF_PROJECT=my-project
# CF_CONFIG=prd
# KAFKA_PROJECT=my-project
# KAFKA_CONFIG=prd
